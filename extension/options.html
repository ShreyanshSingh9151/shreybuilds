<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MailPilot AI Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="options-shell">
      <section class="options-card">
        <p class="options-eyebrow">MailPilot AI</p>
        <h1>Extension Settings</h1>
        <p class="options-copy">
          Configure backend URL, OpenRouter-backed profile defaults, and demo mode controls for the Gmail sidebar.
        </p>

        <form id="settings-form" class="options-form">
          <label>
            <span>Backend Base URL</span>
            <input id="backendBaseUrl" type="url" placeholder="http://localhost:8080" required />
          </label>

          <label>
            <span>Default Provider</span>
            <select id="provider">
              <option value="auto">Auto detect</option>
              <option value="gmail">Gmail only</option>
              <option value="outlook">Outlook Web only</option>
            </select>
          </label>

          <label>
            <span>Default Profile</span>
            <select id="selectedModel">
              <option value="gpt">GPT profile (OpenRouter-backed)</option>
              <option value="claude">Claude profile (OpenRouter-backed)</option>
              <option value="gemini">Gemini profile (OpenRouter-backed)</option>
              <option value="auto">Auto routing (OpenRouter)</option>
            </select>
          </label>

          <label class="options-inline">
            <input id="demoMode" type="checkbox" />
            <span>Enable demo mode fallback (sample thread when Gmail extraction fails)</span>
          </label>

          <label>
            <span>Default Tone</span>
            <select id="tone">
              <option value="professional">Professional</option>
              <option value="formal">Formal</option>
              <option value="friendly">Friendly</option>
              <option value="casual">Casual</option>
            </select>
          </label>

          <label>
            <span>Default Length</span>
            <select id="length">
              <option value="short">Short</option>
              <option value="medium">Medium</option>
              <option value="long">Long</option>
            </select>
          </label>

          <div class="options-actions">
            <button type="submit">Save Settings</button>
            <button id="test-connection" type="button" class="secondary">Test Backend</button>
          </div>
        </form>

        <p id="status" class="options-status"></p>
      </section>
    </main>

    <script src="options.js"></script>
  </body>
</html>
